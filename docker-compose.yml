version: '3.8'

services:
  sucaiku:
    build: /volume1/projects/sucaiku
    container_name: sucaiku-app
    ports:
      - "3456:3456"
    volumes:
      - /volume1/docker/sucaiku/data:/app/data
      - /volume1/projects/sucaiku/public:/app/public
    environment:
      - NODE_ENV=production
      - PORT=3456
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
